apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  selector:
    matchLabels:
      app: nginx
  replicas: 2
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.14.2
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
  - protocol: TCP
    # Expose the service on the specified port internally within the cluster.
    port: 80
    # This is the port on the pod that the request gets sent to
    targetPort: 80
    # This setting makes the service visible outside the Kubernetes cluster by the node’s IP address and the port number declared in this property
    nodePort: 30080
