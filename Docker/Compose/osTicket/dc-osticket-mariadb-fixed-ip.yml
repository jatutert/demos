---
services:
  osticket:
    image: tiredofit/osticket:3.5.2
    container_name: OsTicket
    depends_on:
      - osticket_db
    networks:
      local-network:
        ipv4_address: 192.168.139.15  # Change as needed for your LAN
      backend-network:
    environment:
      # Database configuration
      DB_HOST: osticket_db
      DB_PORT: 3306
      DB_NAME: my_database_name
      DB_USER: some_user
      DB_PASS: some_password

      # Admin configuration
      ADMIN_USER: mike
      ADMIN_PASS: Welkom#01
      ADMIN_EMAIL: yourown@email
      ADMIN_FIRSTNAME: Mike
      ADMIN_LASTNAME: Sierra

      # Installation config
      INSTALL_SECRET: mysecret
      INSTALL_URL: http://osticket.local
      INSTALL_NAME: Helpdesk
      CRON_INTERVAL: 1
    volumes:
      - CHANGE_TO_COMPOSE_DATA_PATH/osticket/config:/var/www/html
    restart: unless-stopped
    
  osticket_db:
    image: mariadb:11.3-jammy
    container_name: OsTicket_DB
    security_opt:
      - no-new-privileges:true
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: some_user
      MYSQL_PASSWORD: some_password
      MYSQL_DATABASE: my_database_name
    volumes:
      - CHANGE_TO_COMPOSE_DATA_PATH/osticket/db:/var/lib/mysql:rw
    networks:
      - backend-network
    restart: unless-stopped

networks:
  backend-network:
    name: osticket-backend-network
  local-network:
    external: true

